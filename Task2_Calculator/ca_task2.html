<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeAlpha Calculator</title>

<style>

body{
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#667eea,#764ba2);
}

.calculator{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

h2{
text-align:center;
margin-bottom:10px;
}

#display{
width:100%;
height:50px;
font-size:22px;
text-align:right;
padding-right:10px;
margin-bottom:15px;
border:2px solid #ddd;
border-radius:5px;
}

.buttons{
display:grid;
grid-template-columns:repeat(4,70px);
gap:10px;
}

button{
height:55px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
background:#f1f1f1;
transition:0.2s;
}

button:hover{
background:#dcdcdc;
transform:scale(1.05);
}

.operator{
background:#ffb74d;
}

.equal{
background:#4CAF50;
color:white;
}

.clear{
background:#f44336;
color:white;
}

</style>

</head>

<body>

<div class="calculator">

<h2>Calculator</h2>

<input type="text" id="display" disabled>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">C</button> <button class="operator" onclick="appendValue('/')">÷</button> <button class="operator" onclick="appendValue('*')">×</button> <button class="operator" onclick="appendValue('-')">−</button>

<button onclick="appendValue('7')">7</button> <button onclick="appendValue('8')">8</button> <button onclick="appendValue('9')">9</button> <button class="operator" onclick="appendValue('+')">+</button>

<button onclick="appendValue('4')">4</button> <button onclick="appendValue('5')">5</button> <button onclick="appendValue('6')">6</button> <button class="equal" onclick="calculate()">=</button>

<button onclick="appendValue('1')">1</button> <button onclick="appendValue('2')">2</button> <button onclick="appendValue('3')">3</button> <button onclick="appendValue('.')">.</button>

<button onclick="appendValue('0')">0</button>

</div>

</div>

<script>

function appendValue(value){
document.getElementById("display").value += value;
}

function clearDisplay(){
document.getElementById("display").value="";
}

function calculate(){
let result=document.getElementById("display").value;
try{
document.getElementById("display").value=eval(result);
}
catch{
document.getElementById("display").value="Error";
}
}

/* BONUS: Keyboard Support */

document.addEventListener("keydown",function(event){

let key=event.key;

if(!isNaN(key) || key==="+" || key==="-" || key==="*" || key==="/" || key==="."){
appendValue(key);
}

if(key==="Enter"){
calculate();
}

if(key==="Backspace"){
document.getElementById("display").value=
document.getElementById("display").value.slice(0,-1);
}

if(key==="Escape"){
clearDisplay();
}

});

</script>

</body>

</html>
